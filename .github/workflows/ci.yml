name: CI

on:
  push:
    branches:
      - main
  pull_request:

# Pull request updates already exercise CI for feature branches. Restricting `push`
# to the default branch avoids duplicate push+PR check suites where the canceled
# superseded run is still reported as a failed PR check.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - if: matrix.os == 'ubuntu-latest'
        run: npm run verify:paths
      - id: replay_corpus
        if: matrix.os == 'ubuntu-latest'
        run: npx tsx src/index.ts replay-corpus
      - if: matrix.os == 'ubuntu-latest'
        run: npm run test:malformed-inventory-regressions
      - if: matrix.os == 'ubuntu-latest'
        run: npm run test:managed-restart-regressions
      - if: ${{ failure() && matrix.os == 'ubuntu-latest' && steps.replay_corpus.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: replay-corpus-mismatch-details
          path: .codex-supervisor/replay/replay-corpus-mismatch-details.json
      - run: npm run build
